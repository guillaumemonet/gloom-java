plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

ext {
    // LWJGL 3 « moderne » (GLFW + OpenGL + OpenAL) — port 2D fidèle (host.Display/Audio).
    lwjglVersion = '3.3.4'
    // Natives Windows x64 (poste de dev). Ajouter d'autres classifiers si besoin.
    lwjglNatives = 'natives-windows'
    // jMonkeyEngine 3 — vue 3D « rebirth » (remaster). Backend LWJGL3.
    jmeVersion = '3.6.1-stable'
}

dependencies {
    implementation platform("org.lwjgl:lwjgl-bom:$lwjglVersion")

    implementation 'org.lwjgl:lwjgl'
    implementation 'org.lwjgl:lwjgl-glfw'
    implementation 'org.lwjgl:lwjgl-opengl'
    implementation 'org.lwjgl:lwjgl-openal'

    runtimeOnly "org.lwjgl:lwjgl::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-glfw::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-opengl::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-openal::$lwjglNatives"

    // --- vue 3D rebirth (jMonkeyEngine) ---
    implementation "org.jmonkeyengine:jme3-core:$jmeVersion"
    implementation "org.jmonkeyengine:jme3-desktop:$jmeVersion"   // AWTLoader, Screenshots
    implementation "org.jmonkeyengine:jme3-effects:$jmeVersion"   // FogFilter (ambiance)
    runtimeOnly    "org.jmonkeyengine:jme3-lwjgl3:$jmeVersion"     // backend LWJGL3 + natives
}

// Le portage conserve la disposition src/ NetBeans existante (pas src/main/java).
sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        // Les assets du jeu sont lus directement depuis le dépôt source GloomAmiga via
        // la couche FileIo : pas de resources Gradle à empaqueter.
        resources {
            srcDirs = []
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

base {
    archivesName = 'gloom'
}

application {
    // Point d'entrée réel du moteur (entrypoint de gloom.s → gloom.host.Main).
    mainClass = 'gloom.host.Main'
    applicationName = 'Gloom'
}

// Les assets du jeu (dépôt GloomAmiga) sont résolus relativement à la racine du
// projet (parent de java/). On exécute donc depuis cette racine.
def assetRoot = projectDir.parentFile

tasks.named('run') {
    workingDir = assetRoot
    systemProperties System.getProperties().subMap(['w', 'h', 'scale', 'map', 'tile', 'engine', 'medspeed'])
}

// « Gloom Rebirth » : vue 3D (jMonkeyEngine), branche rebirth. `-Dshot` = capture rebirth.png puis quitte.
tasks.register('rebirth', JavaExec) {
    group = 'application'
    description = 'Vue 3D rebirth (jMonkeyEngine)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'gloom.rebirth.Rebirth'
    workingDir = assetRoot
    systemProperties System.getProperties().subMap(['shot', 'map', 'tile', 'speed'])
}

// Lance la VARIANTE gloom2.s (planaire/AGA : focshft 7 + castrots128). Même jeu, projection
