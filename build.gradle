tasks.register('run2', JavaExec) {
    group = 'application'
    description = 'Lance la variante moteur gloom2.s (focshft 7 / castrots128)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'gloom.host.Main'
    workingDir = assetRoot
    systemProperties System.getProperties().subMap(['w', 'h', 'scale', 'map', 'tile', 'medspeed'])
    systemProperty 'engine', 'gloom2'
}

